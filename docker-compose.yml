version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    volumes:
      - ./packages/database/prisma:/app/packages/database/prisma
      - db-data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-in-production}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@ai-family.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    restart: unless-stopped

volumes:
  db-data:
